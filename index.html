<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的未喝飲料踩點清安</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.5; 
            padding: 15px; 
            background-color: #f5f7fa; 
            color: #444;
        }
        /* 充滿期待感的清單卡片 */
        .container { 
            max-width: 450px; 
            margin: 20px auto; 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); 
        }
        /* 踩點標題 */
        h2 { 
            text-align: center;
            color: #2b6cb0; 
            margin-top: 0;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 2px dashed #e2e8f0; 
            font-size: 22px;
        }
        .form-group { 
            margin-bottom: 18px; 
        }
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 6px; 
            color: #4a5568; 
            font-size: 14px;
        }
        /* 全面改成自由輸入框 */
        input[type="text"] { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #cbd5e0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
            background-color: #fff;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #2b6cb0;
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.1);
        }
        /* 踩點按鈕 */
        button { 
            width: 100%; 
            background: #2b6cb0; 
            color: white; 
            border: none; 
            padding: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 8px; 
            font-size: 16px; 
            margin-top: 10px; 
            transition: background-color 0.2s;
        }
        button:hover { 
            background: #2b529a; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 沒喝過的飲料・踩點觀望清單</h2>
    
    <div class="form-group">
        <label for="storeName">🏪 想挑戰的飲料店 / 品項</label>
        <input type="text" id="storeName" placeholder="例如：得正焙烏龍、當地限定神祕茶攤">
    </div>

    <div class="form-group">
        <label for="location">📍 在哪裡看到的？/ 預計去哪買</label>
        <input type="text" id="location" placeholder="例如：一中街商圈、台北信義區">
    </div>
    
    <button onclick="submitOrder()">加入我的口袋清單</button>
</div>

<script>
    async function submitOrder() {
        const storeName = document.getElementById('storeName').value.trim();
        const location = document.getElementById('location').value.trim();

        // 防呆驗證
        if (!storeName || !location) {
            alert("要把店名（品項）和地點都填上，以後才找不到喔！");
            return;
        }

        const orderData = {
            store: storeName,
            loc: location
        };

        // ⚠️ 請記得將下方的網址替換為你在 Google Apps Script 部署得到的網頁應用程式網址
        const scriptURL = 'YOUR_DEPLOY_URL'; 

        try {
            const response = await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(orderData)
            });

            if (response.ok) {
                alert("📌 已成功放入未喝清單！等你去收服它。");
                // 成功後清空輸入框
                document.getElementById('storeName').value = "";
                document.getElementById('location').value = "";
            } else {
                alert("寫入失敗，請確認 Apps Script 設定。");
            }
        } catch (error) {
            console.error('錯誤:', error.message);
            alert("連線失敗！請檢查網址與網路狀態。");
        }
    }
</script>

</body>
</html>
