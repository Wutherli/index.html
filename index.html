<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的飲料足跡地圖日誌</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.5; 
            padding: 15px; 
            background-color: #f5f5f3; 
            color: #333;
        }
        .container { 
            max-width: 450px; 
            margin: 20px auto; 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }
        h2 { 
            text-align: center;
            color: #2c5282; 
            margin-top: 0;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 2px dashed #e2e8f0; 
            font-size: 22px;
        }
        .form-group { 
            margin-bottom: 18px; 
        }
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 6px; 
            color: #4a5568; 
            font-size: 14px;
        }
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #cbd5e0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #f7fafc;
            border: 1px dashed #cbd5e0;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button { 
            width: 100%; 
            background: #2c5282; 
            color: white; 
            border: none; 
            padding: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 8px; 
            font-size: 16px; 
            margin-top: 10px; 
        }
        button:hover { 
            background: #1a365d; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 飲料開箱足跡 × 地圖日誌</h2>
    
    <div class="form-group">
        <label for="storeName">🏪 飲料店品牌與品項</label>
        <input type="text" id="storeName" placeholder="例如：得正 - 焙烏龍鮮奶">
    </div>

    <div class="form-group">
        <label for="location">📍 購買的精確位置 / 分店</label>
        <input type="text" id="location" placeholder="建議填寫完整，例如：台中市西區勤美店">
    </div>

    <div class="form-group">
        <label for="photo">📷 上傳飲料美照</label>
        <input type="file" id="photo" accept="image/*">
    </div>
    
    <button onclick="submitOrder()">紀錄足跡並生成地圖</button>
</div>

<script>
    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    async function submitOrder() {
        const storeName = document.getElementById('storeName').value.trim();
        const location = document.getElementById('location').value.trim();
        const photoFile = document.getElementById('photo').files[0];

        if (!storeName || !location) {
            alert("店名和位置都要填寫，地圖才能精確定位喔！");
            return;
        }

        // 自動生成 Google 地圖搜尋連結
        const mapUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(storeName + " " + location);

        let photoBase64 = "";
        if (photoFile) {
            photoBase64 = await getBase64(photoFile);
        }

        const orderData = {
            store: storeName,
            loc: location,
            map: mapUrl, // 傳送地圖連結給後端
            photo: photoBase64
        };

        // ⚠️ 請記得更換為你的 Apps Script 網址
        const scriptURL = 'YOUR_DEPLOY_URL'; 

        try {
            const response = await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(orderData)
            });

            if (response.ok) {
                alert("✨ 紀錄成功！地圖連動已同步寫入 Excel 囉！");
                document.getElementById('storeName').value = "";
                document.getElementById('location').value = "";
                document.getElementById('photo').value = "";
            } else {
                alert("寫入失敗，請檢查 Apps Script 設定。");
            }
        } catch (error) {
            console.error('錯誤:', error.message);
            alert("連線失敗，請檢查網址。");
        }
    }
</script>

</body>
</html>
